<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>01 — Real-time Search</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 40px auto; padding: 0 16px; }
    input { width: 100%; padding: 8px; font-size: 16px; box-sizing: border-box; }
    ul { list-style: none; padding: 0; margin-top: 12px; }
    li { padding: 8px 0; border-bottom: 1px solid #eee; }
    .empty { color: #999; font-style: italic; }
  </style>
</head>
<body>
  <h2>Real-time Search</h2>
  <input type="text" id="search" placeholder="Type to filter..." />
  <ul id="results"></ul>

  <script>
    const items = ["banana", "apple", "pineapple", "kiwi", "mango", "apricot", "grape"];
    const searchInput = document.getElementById("search");
    const resultsList = document.getElementById("results");

    function render(filtered) {
      if (filtered.length === 0) {
        resultsList.innerHTML = `<li class="empty">No results found.</li>`;
        return;
      }
      resultsList.innerHTML = filtered
        .map(item => `<li>${item}</li>`)
        .join("");
    }

    searchInput.addEventListener("input", (e) => {
      const query = e.target.value.toLowerCase().trim();
      const filtered = query
        ? items.filter(item => item.toLowerCase().includes(query))
        : items;
      render(filtered);
    });

    // Show all on load
    render(items);
  </script>
</body>
</html>
