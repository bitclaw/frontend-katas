<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>06 — Binary Search</title>
  <style>
    body { font-family: monospace; max-width: 540px; margin: 40px auto; padding: 0 16px; }
    h2 { font-family: sans-serif; }
    .test { padding: 6px 0; border-bottom: 1px solid #eee; display: flex; gap: 12px; }
    .pass { color: green; }
    .fail { color: red; }
    .label { color: #555; flex: 1; }
    textarea {
      width: 100%; height: 180px; font-family: monospace;
      font-size: 14px; margin-top: 12px; box-sizing: border-box;
    }
    button { margin-top: 8px; padding: 8px 16px; cursor: pointer; font-size: 14px; }
    #results { margin-top: 16px; }
  </style>
</head>
<body>
  <h2>Binary Search</h2>
  <p>Edit the function below and click Run to test it.</p>

  <textarea id="code">
function binarySearch(array, target) {
  let low = 0;
  let high = array.length - 1;

  while (low <= high) {
    const mid = Math.floor((low + high) / 2);

    if (array[mid] === target) return mid;
    if (array[mid] < target)   low = mid + 1;
    else                       high = mid - 1;
  }

  return null;
}
  </textarea>

  <button onclick="runTests()">Run Tests</button>
  <div id="results"></div>

  <script>
    const testCases = [
      { args: [[1, 2, 3, 4, 5], 3],  expected: 2,    label: "binarySearch([1,2,3,4,5], 3) → 2" },
      { args: [[1, 2, 3, 4, 5], 1],  expected: 0,    label: "binarySearch([1,2,3,4,5], 1) → 0 (first element)" },
      { args: [[1, 2, 3, 4, 5], 5],  expected: 4,    label: "binarySearch([1,2,3,4,5], 5) → 4 (last element)" },
      { args: [[1, 2, 3, 4, 5], 6],  expected: null, label: "binarySearch([1,2,3,4,5], 6) → null (not found)" },
      { args: [[], 1],               expected: null, label: "binarySearch([], 1) → null (empty array)" },
      { args: [[42], 42],            expected: 0,    label: "binarySearch([42], 42) → 0 (single element)" },
      { args: [[1, 3, 5, 7, 9], 7],  expected: 3,    label: "binarySearch([1,3,5,7,9], 7) → 3" },
    ];

    function runTests() {
      const code = document.getElementById("code").value;
      const results = document.getElementById("results");

      let fn;
      try {
        fn = new Function(`${code}; return binarySearch;`)();
      } catch (e) {
        results.innerHTML = `<p style="color:red">Syntax error: ${e.message}</p>`;
        return;
      }

      const html = testCases.map(({ args, expected, label }) => {
        const actual = fn(...args);
        const pass = actual === expected;
        return `<div class="test">
          <span class="label">${label}</span>
          <span class="${pass ? "pass" : "fail"}">${pass ? "PASS" : `FAIL (got ${actual})`}</span>
        </div>`;
      }).join("");

      results.innerHTML = html;
    }

    runTests();
  </script>
</body>
</html>
